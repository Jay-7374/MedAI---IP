<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Access Portal - MedAI Flow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 10% 10%, rgba(6,182,212,0.08) 0%, transparent 40%); padding: 1.5rem; }
        .auth-card { width: 100%; max-width: 420px; }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div></div>

    <div class="auth-wrapper">
        <div class="card auth-card">
            <div style="text-align:center; margin-bottom:2rem;">
                <div class="brand-icon" style="margin:0 auto 1rem; width:48px; height:48px; font-size:1.5rem;"><i class="fas fa-shield-alt"></i></div>
                <h2>System Gateway</h2>
                <p style="color:var(--text-secondary); font-size:0.85rem; margin-top:0.25rem;">Provide certified parameters to authenticate session</p>
            </div>

            <form id="loginSystemForm">
                <div class="form-group">
                    <label class="form-label">Clinical Email Address</label>
                    <input type="email" id="uEmail" class="form-control" required placeholder="name@hospital.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Security Password</label>
                    <input type="password" id="uPass" class="form-control" required placeholder="••••••••" value="password123">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; font-size:0.85rem;">
                    <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                        <input type="checkbox" style="accent-color:var(--primary);"> Remember parameters
                    </label>
                    <a href="#" style="color:var(--primary); margin-left:auto;">Forgot Credential?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Authorize Session</button>
            </form>

            <div style="margin-top:1.5rem; text-align:center; font-size:0.85rem; color:var(--text-secondary);">
                <span>Awaiting validation token allocation?</span> <a href="#" style="color:var(--accent); font-weight:500;">Register Hub</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
